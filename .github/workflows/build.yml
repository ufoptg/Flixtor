name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: "8.7"

    - name: Purge stale duplicate sources
      run: |
        rm -rf app/src/main/res/layout/activity
        rm -rf app/src/main/java/com/flixtor
        echo "Cleaned. Current sources:"
        find app/src/main/java -name "*.kt"
        find app/src/main/res/layout -type f

    - name: Ensure Gradle wrapper exists
      run: |
        if [ ! -f "gradlew" ]; then
          echo "gradlew missing – generating wrapper..."
          gradle wrapper --gradle-version 8.7 --distribution-type bin
        fi
        chmod +x gradlew
        ls -la gradlew gradle/wrapper/

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flixtor-app
        path: app/build/outputs/apk/debug
